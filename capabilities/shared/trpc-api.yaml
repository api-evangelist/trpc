naftiko: "1.0.0-alpha1"

info:
  label: "tRPC HTTP API"
  description: >-
    The tRPC HTTP protocol API surface. tRPC servers expose procedures
    via HTTP GET (queries) and POST (mutations) using automatic request
    batching. This capability definition covers the standard tRPC HTTP
    protocol for integration with tRPC-based backends.
  tags:
    - tRPC
    - TypeScript
    - RPC
    - Type Safety
    - API Framework
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRPC_BEARER_TOKEN: TRPC_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: trpc
      baseUri: https://your-server.example.com/api/trpc
      description: "tRPC server HTTP endpoint"
      authentication:
        type: bearer
        token: "{{TRPC_BEARER_TOKEN}}"
      resources:
        - name: health
          path: /health
          description: "Server health check"
          operations:
            - name: health-check
              method: GET
              description: "Check tRPC server health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: procedures
          path: /{procedure}
          description: "tRPC procedure invocation"
          operations:
            - name: query-procedure
              method: GET
              description: "Invoke a tRPC query procedure"
              inputParameters:
                - name: procedure
                  in: path
                  type: string
                  required: true
                  description: "Procedure path (e.g., user.getUser)"
                - name: input
                  in: query
                  type: string
                  required: false
                  description: "JSON-encoded input"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: mutation-procedure
              method: POST
              description: "Invoke a tRPC mutation procedure"
              inputParameters:
                - name: procedure
                  in: path
                  type: string
                  required: true
                  description: "Procedure path"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  json: "{{tools.input}}"

        - name: batch
          path: /batch
          description: "Batch multiple procedure calls"
          operations:
            - name: batch-procedures
              method: POST
              description: "Execute multiple tRPC procedures in one request"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "0":
                    json: "{{tools.procedure_0_input}}"

  exposes:
    - type: rest
      port: 8101
      namespace: trpc-rest
      resources:
        - path: /v1/procedures/{name}
          name: procedure
          description: "tRPC procedure proxy"
          operations:
            - method: GET
              name: query-procedure
              description: "Call a tRPC query"
              call: "trpc.query-procedure"
              with:
                procedure: "rest.name"
                input: "rest.input"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: mutation-procedure
              description: "Call a tRPC mutation"
              call: "trpc.mutation-procedure"
              with:
                procedure: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: trpc-mcp
      transport: http
      tools:
        - name: query-procedure
          description: "Invoke a tRPC query procedure by name"
          hints:
            readOnly: true
            openWorld: true
          call: "trpc.query-procedure"
          with:
            procedure: "tools.procedure"
            input: "tools.input"
          outputParameters:
            - type: object
              mapping: "$."
        - name: mutation-procedure
          description: "Invoke a tRPC mutation procedure by name"
          hints:
            readOnly: false
          call: "trpc.mutation-procedure"
          with:
            procedure: "tools.procedure"
            input: "tools.input"
          outputParameters:
            - type: object
              mapping: "$."
        - name: health-check
          description: "Check the health of a tRPC server"
          hints:
            readOnly: true
          call: "trpc.health-check"
          outputParameters:
            - type: object
              mapping: "$."

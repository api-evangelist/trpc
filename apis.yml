apis:
  - aid: trpc:http-api
    name: tRPC HTTP Protocol
    description: >-
      The tRPC HTTP API protocol surface. tRPC servers expose procedures via
      HTTP GET (queries) and HTTP POST (mutations). Clients use httpBatchLink
      to batch concurrent calls into single requests. Input is passed via
      JSON-encoded query parameters (GET) or request bodies (POST).
      Authentication uses Bearer tokens for protected procedures.

aid: trpc
name: tRPC
description: >-
  tRPC is a TypeScript framework for building end-to-end typesafe APIs without
  code generation or schemas. It leverages TypeScript's type inference to provide
  full static typesafety and autocompletion between client and server, with zero
  runtime dependencies. tRPC v11 supports queries, mutations, and subscriptions
  via HTTP GET/POST and WebSocket adapters for Express, Fastify, Next.js, AWS
  Lambda, and edge runtimes.
